name: Deploy to Docker on Push
on:
  push:
    branches:
      - custom
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Ubuntu server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            TARGET="/opt/moontv"

            # 进入目录
            cd "$TARGET"

            # ==============================================
            # 清空目录所有内容（保留目录本身，你要的逻辑）
            # ==============================================
            shopt -s dotglob
            rm -rf *
            shopt -u dotglob

            # ==============================================
            # 重新初始化 Git，拉取最新代码
            # ==============================================
            git init
            git remote add origin https://github.com/xt13872989163/MoonTV.git
            git fetch origin
            git checkout custom -f

            # ==============================================
            # 重启 Docker
            # ==============================================
            docker compose down
            docker compose up -d --build
            docker image prune -f
