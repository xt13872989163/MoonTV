name: Deploy to Docker on Push
on:
  # 仅当推送到 main 分支时触发部署（如果你的默认分支是 master，请修改为 master）
  push:
    branches:
      - custom
  # 保留手动触发功能，方便随时重新部署
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出最新代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. SSH 到服务器执行部署
      - name: Deploy to Ubuntu server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 【必须替换】服务器上的项目路径和部署命令
          script: |
            # ==============================================
            # 最安全逻辑：
            # 1. 没有目录 → 克隆
            # 2. 有目录但不是git → 删掉重建
            # 3. 是git → 直接更新
            # ==============================================

            # 目标目录
            TARGET="/opt/moontv"

            # 如果目录不存在 → 直接克隆
            if [ ! -d "$TARGET" ]; then
              git clone https://github.com/xt13872989163/MoonTV.git "$TARGET"
            else
              # 如果目录存在，但不是git仓库 → 删除重建
              if [ ! -d "$TARGET/.git" ]; then
                rm -rf "$TARGET"
                git clone https://github.com/xt13872989163/MoonTV.git "$TARGET"
              fi
            fi

            # 进入目录并更新
            cd "$TARGET"
            git pull origin custom

            # 重启服务
            docker compose down
            docker compose up -d --build
            docker image prune -f
