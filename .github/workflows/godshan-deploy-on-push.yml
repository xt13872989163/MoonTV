name: Deploy to Docker on Push
on:
  push:
    branches:
      - custom
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Ubuntu server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 遇到任何错误立刻停止，并且让 Action 标红失败
            set -euo pipefail

            TARGET="/opt/moontv"

            # 进入目录
            cd "$TARGET"

            # ==============================
            # 清空内容（保留目录本身）
            # ==============================
            shopt -s dotglob
            rm -rf ./*
            shopt -u dotglob

            # ==============================
            # 全新拉取代码
            # ==============================
            git init
            git remote add origin https://github.com/xt13872989163/MoonTV.git
            git fetch origin
            git checkout custom -f

            # ==============================
            # 重启服务
            # ==============================
            docker compose down
            docker compose up -d --build
            docker image prune -f
